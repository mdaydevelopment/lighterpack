name: Helm Chart CI

on:
  push:
    branches: [ "master" ]
    paths:
      - "charts/**"
      - ".github/workflows/helm-chart.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "charts/**"
      - ".github/workflows/helm-chart.yml"

jobs:

  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v5

    - uses: azure/setup-helm@v4

    - name: Lint chart
      run: helm lint charts/lighterpack

    - name: Render templates
      run: helm template charts/lighterpack

    - name: Package chart
      run: helm package charts/lighterpack

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

    - name: Push chart
      if: github.event_name != 'pull_request'
      run: helm push lighterpack-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
