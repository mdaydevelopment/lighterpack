replicaCount: 1

image:
  repository: ghcr.io/mdaydevelopment/lighterpack
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Rendered to config/local.json inside the container, overriding the
# application defaults in config/default.json. Any key from default.json
# can be set here (e.g. mailgunDomain, imgurClientID, moderators).
config:
  environment: production
  deployUrl: http://localhost:3000
  publicUrl: http://localhost:3000
  # host/database for MongoDB, e.g. my-mongodb.default.svc.cluster.local/lighterpack
  # Leave empty to use the bundled MongoDB (mongodb.enabled). Required when
  # mongodb.enabled is false.
  databaseUrl: ""

# Bundled single-instance MongoDB. Suitable for small self-hosted
# deployments; disable it and set config.databaseUrl to bring your own.
mongodb:
  enabled: true
  image:
    repository: mongo
    # Pinned to 4.4: the app's mongodb driver (2.2.x via mongojs) speaks the
    # legacy wire protocol, which MongoDB server 5.1+ removed. Do not bump
    # past 5.0 until the driver is upgraded.
    tag: "4.4"
    pullPolicy: IfNotPresent
  database: lighterpack
  persistence:
    enabled: true
    size: 1Gi
    # Empty string uses the cluster's default StorageClass.
    storageClass: ""
  resources: {}

# Extra environment variables for the app container, e.g. to inject
# secrets as NODE_CONFIG overrides:
#   - name: NODE_CONFIG
#     valueFrom:
#       secretKeyRef:
#         name: lighterpack-secrets
#         key: node-config-json
extraEnv: []

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  labels: {}
  annotations: {}
  hosts:
    - host: lighterpack.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

podAnnotations: {}
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
